services:
  database:
    image: mysql:8.0
    container_name: mywallet_db
    environment:
      MYSQL_ROOT_PASSWORD: mywalletrootpassword
      MYSQL_DATABASE: mywallet
      MYSQL_USER: mywallet
      MYSQL_PASSWORD: mywalletpassword
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped

volumes:
  mysql_data:
